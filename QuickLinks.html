<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quick Links</title>

  <style>
    :root{
      --page-bg:#0b0c0f;        /* ✅ black background */
      --card-bg:#ffffff;
      --text:#171717;
      --ring:#e5e7eb;
      --accent:#111827;
      --brand:#111827;
      --shadow: 0 10px 24px rgba(0,0,0,.25);
      --radius:16px;
    }

    *{ box-sizing:border-box }

    html, body{
      margin:0;
      padding:0;
      background:var(--page-bg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap{
      max-width:950px;
      margin:0 auto;
      padding:8px;
    }

    .card{
      background:var(--card-bg);
      border:1px solid var(--ring);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
    }

    /* grid */
    .grid{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:12px;
    }

    @media (max-width:640px){
      .grid{ grid-template-columns:1fr; }
    }

    .item a{
      display:flex;
      align-items:center;
      gap:10px;
      min-height:52px;
      padding:12px 14px;
      text-decoration:none;
      color:var(--accent);
      font-size:14px;
      font-weight:700;
      border:1px solid var(--ring);
      border-radius:12px;
      background:#fafafa;
      transition:all .15s ease;
    }

    .item a:hover{
      background:#f4f4f5;
      transform:translateY(-1px);
      box-shadow:0 6px 14px rgba(0,0,0,.10);
    }

    .icon{
      width:28px;
      height:28px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      background:#111827;
      color:#fff;
      flex-shrink:0;
    }

    .footer{
      display:flex;
      justify-content:flex-end;
      margin-top:12px;
    }

    .view-more{
      font-size:13px;
      font-weight:800;
      color:#fff;
      background:var(--brand);
      border-radius:10px;
      padding:10px 14px;
      text-decoration:none;
    }

    .view-more:hover{ filter:brightness(1.05); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">

      <div class="grid">
        <div class="item">
          <a href="https://app.getguru.com/card/cjgM6RAi/Admin-Request-Form1" target="_top">
            <span class="icon">🗂️</span>
            Admin Request Form
          </a>
        </div>

        <div class="item">
          <a href="https://app.getguru.com/card/c8GGz9ji/HR-Request-Form" target="_top">
            <span class="icon">👥</span>
            HR Request Form
          </a>
        </div>

        <div class="item">
          <a href="https://app.getguru.com/card/cdG76gbi/Finance-Request-Form" target="_top">
            <span class="icon">💰</span>
            Finance Request Form
          </a>
        </div>

        <div class="item">
          <a href="https://app.getguru.com/card/iMqqrGxT/Time-Off-Request-Form" target="_top">
            <span class="icon">🌴</span>
            Time-Off Request Form
          </a>
        </div>

        <div class="item">
          <a href="https://app.getguru.com/card/cLrrXd8i/IT-Request-Form" target="_top">
            <span class="icon">💻</span>
            IT Request Form
          </a>
        </div>

        <div class="item">
          <a href="https://app.getguru.com/card/i79rKa4T/Legal-Request-Form" target="_top">
            <span class="icon">⚖️</span>
            Legal Request Form
          </a>
        </div>
      </div>

      <div class="footer">
        <a class="view-more" href="https://app.getguru.com/page/42d56300-50f3-419e-9339-7becad1eeae6#wnQIvyAfIK02" target="_top">
          View more →
        </a>
      </div>

    </div>
  </div>
</body>
</html>

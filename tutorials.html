<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tutorial Videos</title>

<style>
  :root{
    --page-bg:#0b0c0f;
    --card-bg:#ffffff;
    --text:#171717;
    --muted:#5f6368;
    --ring:#e5e7eb;
    --accent:#111827;
    --brand:#111827;
    --radius:16px;
    --shadow:0 10px 24px rgba(0,0,0,.20);

    --rows:2;
    --card-h:220px;
    --gap:14px;
    --pad:8px;
    --scroller-h:calc(var(--rows) * var(--card-h) + (var(--rows) - 1) * var(--gap) + var(--pad) * 2);
  }

  *{ box-sizing:border-box; }

  html, body{
    margin:0;
    background:var(--page-bg);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    color:var(--text);
  }

  .wrap{
    max-width:100%;
    padding:8px;
  }

  .inner{
    max-width:920px;
    margin:0 auto;
  }

  .scroller{
    height:var(--scroller-h);
    overflow-y:auto;
    padding:var(--pad) 0;
    display:grid;
    gap:var(--gap);
    scroll-snap-type:y mandatory;
    scroll-behavior:smooth;
  }

  .scroller::-webkit-scrollbar{ width:8px; }
  .scroller::-webkit-scrollbar-thumb{
    background:#2a2b2f;
    border-radius:999px;
  }

  .video-card{
    min-height:var(--card-h);
    scroll-snap-align:start;
    background:var(--card-bg);
    border:1px solid var(--ring);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:14px;
    display:grid;
    grid-template-columns:280px 1fr;
    gap:16px;
    align-items:center;
  }

  .video-frame{
    width:100%;
    aspect-ratio:16 / 9;
    border:0;
    border-radius:12px;
    background:#000;
  }

  .title{
    font-size:17px;
    font-weight:800;
    color:var(--accent);
    margin:0 0 6px;
  }

  .description{
    font-size:14px;
    line-height:1.55;
    color:var(--muted);
    margin:0;
  }

  .watch{
    display:inline-flex;
    margin-top:12px;
    padding:9px 12px;
    border-radius:10px;
    background:var(--brand);
    color:#fff;
    text-decoration:none;
    font-size:13px;
    font-weight:800;
  }

  .empty{
    color:#fff;
    text-align:center;
    opacity:.85;
    padding:24px;
  }

  @media (max-width:720px){
    :root{ --card-h:300px; }

    .video-card{
      grid-template-columns:1fr;
      align-items:start;
    }
  }
</style>
</head>

<body>
  <div class="wrap">
    <div class="inner">
      <div id="empty" class="empty" style="display:none;">No tutorial videos yet.</div>
      <div id="scroller" class="scroller"></div>
    </div>
  </div>

<script>
  const cacheBuster = 'ts=' + Date.now();
  const scroller = document.getElementById('scroller');
  const empty = document.getElementById('empty');

  fetch('tutorials.json?' + cacheBuster, { cache:'no-store' })
    .then(r => {
      if(!r.ok) throw new Error('tutorials.json not found');
      return r.json();
    })
    .then(items => {
      if(!items || !items.length){
        empty.style.display = 'block';
        return;
      }

      scroller.innerHTML = items.map(video => {
        const title = escapeHtml(video.title || 'Tutorial Video');
        const description = escapeHtml(video.description || '');
        const loom = video.loom || '#';

        return `
          <article class="video-card">
            <iframe
              class="video-frame"
              src="${loom}"
              allowfullscreen
              webkitallowfullscreen
              mozallowfullscreen>
            </iframe>

            <div>
              <h3 class="title">${title}</h3>
              <p class="description">${description}</p>
              <a class="watch" href="${loom.replace('/embed/', '/share/')}" target="_blank" rel="noopener">
                Watch in Loom →
              </a>
            </div>
          </article>
        `;
      }).join('');
    })
    .catch(err => {
      console.error(err);
      empty.style.display = 'block';
      empty.textContent = '⚠️ Could not load tutorials.json';
    });

  function escapeHtml(str){
    return String(str || '')
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'",'&#39;');
  }
</script>
</body>
</html>

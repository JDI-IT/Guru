<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tutorial Videos</title>

<!-- Swiper CSS -->
<link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css"/>

<style>
  :root{
    --page-bg:#0b0c0f;
    --card-bg:#ffffff;
    --text:#171717;
    --muted:#5f6368;
    --ring:#e5e7eb;
    --accent:#111827;
    --radius:16px;
    --shadow:0 10px 24px rgba(0,0,0,.20);
    --arrow:#ffffff;
  }

  *{ box-sizing:border-box; }

  html, body{
    margin:0;
    background:var(--page-bg);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    color:var(--text);
  }

  .wrap{
    max-width:100%;
    padding:8px;
  }

  .inner{
    max-width:920px;
    margin:0 auto;
  }

  .swiper{
    width:100%;
    height:460px;
    padding:0;
    overflow:hidden;
  }

  .swiper-slide{
    height:auto;
    display:flex;
  }

  .video-card{
    width:100%;
    background:var(--card-bg);
    border:1px solid var(--ring);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:14px;
    display:grid;
    grid-template-columns:280px 1fr;
    gap:16px;
    align-items:center;
  }

  .video-frame{
    width:100%;
    aspect-ratio:16 / 9;
    border:0;
    border-radius:12px;
    background:#000;
  }

  .title{
    font-size:17px;
    font-weight:800;
    color:var(--accent);
    margin:0 0 6px;
  }

  .description{
    font-size:14px;
    line-height:1.55;
    color:var(--muted);
    margin:0;
  }

  .watch{
    display:inline-flex;
    margin-top:12px;
    padding:9px 12px;
    border-radius:10px;
    background:var(--accent);
    color:#fff;
    text-decoration:none;
    font-size:13px;
    font-weight:800;
  }

  .swiper-button-prev,
  .swiper-button-next{
    left:50%;
    transform:translateX(-50%);
    color:var(--arrow);
    width:28px;
    height:28px;
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.35);
    border-radius:999px;
  }

  .swiper-button-prev{ top:8px; }
  .swiper-button-next{ bottom:8px; }

  .swiper-button-prev:after,
  .swiper-button-next:after{
    font-size:14px;
  }

  .swiper-pagination-bullet{
    background:#fff;
    opacity:.35;
  }

  .swiper-pagination-bullet-active{
    opacity:1;
  }

  .empty{
    color:#fff;
    text-align:center;
    opacity:.85;
    padding:24px;
  }

  @media (max-width:720px){
    .swiper{
      height:620px;
    }

    .video-card{
      grid-template-columns:1fr;
      align-items:start;
    }
  }
</style>
</head>

<body>
  <div class="wrap">
    <div class="inner">
      <div id="empty" class="empty" style="display:none;">No tutorial videos yet.</div>

      <div class="swiper" id="swiperRoot" style="display:none;">
        <div class="swiper-wrapper" id="slides"></div>
        <div class="swiper-button-prev" aria-label="Previous"></div>
        <div class="swiper-button-next" aria-label="Next"></div>
        <div class="swiper-pagination"></div>
      </div>
    </div>
  </div>

<!-- Swiper JS -->
<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>

<script>
  const cacheBuster = 'ts=' + Date.now();
  const wrapper = document.getElementById('slides');
  const empty = document.getElementById('empty');
  const swiperRoot = document.getElementById('swiperRoot');

  fetch('tutorials.json?' + cacheBuster, { cache:'no-store' })
    .then(r => {
      if(!r.ok) throw new Error('tutorials.json not found');
      return r.json();
    })
    .then(items => {
      if(!items || !items.length){
        empty.style.display = 'block';
        return;
      }

      items.forEach(video => {
        const title = escapeHtml(video.title || 'Tutorial Video');
        const description = escapeHtml(video.description || '');
        const loom = video.loom || '#';
        const watchLink = loom.replace('/embed/', '/share/');

        const slide = document.createElement('div');
        slide.className = 'swiper-slide';

        slide.innerHTML = `
          <article class="video-card">
            <iframe
              class="video-frame"
              src="${loom}"
              allowfullscreen
              webkitallowfullscreen
              mozallowfullscreen>
            </iframe>

            <div>
              <h3 class="title">${title}</h3>
              <p class="description">${description}</p>
              <a class="watch" href="${watchLink}" target="_blank" rel="noopener">
                Watch in Loom →
              </a>
            </div>
          </article>
        `;

        wrapper.appendChild(slide);
      });

      swiperRoot.style.display = 'block';

      new Swiper('.swiper', {
        direction:'vertical',
        slidesPerView:2,
        spaceBetween:14,
        loop:items.length > 2,
        speed:600,
        autoplay:{
          delay:4000,
          disableOnInteraction:false,
          pauseOnMouseEnter:true
        },
        mousewheel:{ forceToAxis:true },
        pagination:{
          el:'.swiper-pagination',
          clickable:true
        },
        navigation:{
          nextEl:'.swiper-button-next',
          prevEl:'.swiper-button-prev'
        }
      });
    })
    .catch(err => {
      console.error(err);
      empty.style.display = 'block';
      empty.textContent = '⚠️ Could not load tutorials.json';
    });

  function escapeHtml(str){
    return String(str || '')
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'",'&#39;');
  }
</script>
</body>
</html>
